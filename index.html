<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parallax Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="image-track">
    <div class="card">
      <img class="image" src="images/professional.jpg" draggable="false" alt="" />
    </div>

    <div class="card">
      <img class="image" src="images/CARNIVAL MASHUP_9.1.1.jpg" draggable="false" alt="" />
    </div>

    <div class="card">
      <img class="image" src="images/Ms0OoD.png" draggable="false" alt="" />
    </div>

    <div class="card">
      <img class="image" src="images/secret_technique.png" draggable="false" alt="" />
    </div>

    <div class="card">
      <img class="image" src="images/forgotten king.jpg" draggable="false" alt="" />
    </div>
  </div>

  <div id="viewer" class="viewer">
    <img id="viewer-image" class="viewer-image" draggable="false" alt="" />
    <div id="viewer-text" class="viewer-text"></div>
    <div id="viewer-strip" class="viewer-strip"></div>
  </div>

  <script src="index.js"></script>
</body>
</html>
